name: Azion Deploy

on:
  workflow_dispatch: 
  pull_request:
    types:
      - closed
    branches:
      - "main"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Use Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install NPM dependencies
        run: npm i
        
      - name: Install Azion CLI
        run: |
          curl -o azionlinux https://downloads.azion.com/linux/x86_64/azion
          sudo mv azionlinux /usr/bin/azion
          sudo chmod u+x /usr/bin/azion

      - name: Azion Action Deploy
        run: |
          azion -t ${{ secrets.AZION_TOKEN }}
          azion deploy --local --debug --auto --yes
